<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevOps Training - Web UI</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }
      code { background: #f6f6f6; padding: 2px 6px; border-radius: 6px; }
      .ok { color: #0a7a0a; font-weight: 700; }
      .warn { color: #8a4b00; }
      button { padding: 10px 12px; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
      pre { background: #0b1020; color: #e9eefb; padding: 12px; border-radius: 12px; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>Web UI <span class="ok">OK</span></h1>
    <p>Si ves esto, Nginx está sirviendo contenido estático desde un contenedor.</p>

    <h2>Prueba de servicios</h2>
    <p class="warn">Estas llamadas van contra los puertos publicados en el host. En la práctica, la validación principal también se hace con <code>curl</code>.</p>

    <button id="btn-java">Llamar a backend Java</button>
    <button id="btn-python">Llamar a backend Python</button>
    <pre id="out-java">(sin ejecutar backend Java)</pre>
    <pre id="out-python">(sin ejecutar backend Python)</pre>

    <script>
      async function callEndpoint(outputId, url) {
        const out = document.getElementById(outputId);
        out.textContent = 'Llamando...';
        try {
          const r = await fetch(url);
          out.textContent = await r.text();
        } catch (e) {
          out.textContent = String(e);
        }
      }

      document.getElementById('btn-java').addEventListener('click', async () => {
        await callEndpoint('out-java', 'http://localhost:8084/hello');
      });

      document.getElementById('btn-python').addEventListener('click', async () => {
        await callEndpoint('out-python', 'http://localhost:5001/');
      });
    </script>
  </body>
</html>
