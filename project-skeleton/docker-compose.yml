version: "3.7"

# Template de trabajo para la práctica.
# Objetivo: completar progresivamente un entorno DEV con:
# - Base de datos PostgreSQL
# - Job de inicialización DDL
# - Backend Java sin persistencia
# - Backend Python con persistencia en PostgreSQL
# - Web UI
# - Docker Registry privado
# - SonarQube + su base de datos
# - Artifactory como repositorio de artefactos
#
# Recomendación didáctica:
# 1. Completa primero db + ddl_job
# 2. Rellena el bloque backend-java
# 3. Rellena el bloque backend-python
# 4. Rellena el bloque webui
# 5. Activa registry
# 6. Activa sonardb + sonarqube
# 7. Activa artifactory
#
# Importante:
# - Este archivo no debe contener la solución final cerrada.
# - Los bloques de aplicación y herramientas se dejan como plantilla.
# - La idea es que el alumno los complete con ayuda del README.

networks:
  training_net:
    driver: bridge

volumes:
  db_data:
  registry_data:
  sonarqube_data:
  sonardb_data:
  artifactory_data:

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: training
      POSTGRES_PASSWORD: trainingpwd
      POSTGRES_DB: trainingdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - training_net

  ddl_job:
    image: postgres:16-alpine
    depends_on:
      - db
    environment:
      PGPASSWORD: trainingpwd
    volumes:
      - ./ddl:/ddl:ro
    networks:
      - training_net
    command: >
      sh -c "until pg_isready -h db -U training -d trainingdb; do sleep 2; done;
             psql -h db -U training -d trainingdb -f /ddl/init.sql"

